<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softball Lineup Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        const LucideInit = () => {
            useEffect(() => { lucide.createIcons(); });
            return null;
        };

        const POSITIONS = ['P', 'C', '1B', '2B', '3B', 'SS', 'LF', 'LC', 'RC', 'RF'];
        const BATTING_SLOTS = Array.from({ length: 13 }, (_, i) => i + 1);
        const INNINGS = [1, 2, 3, 4, 5, 6];
        const DEFAULT_ROSTER = `Charlotte D\nAnaya P\nEmma P\nGenevieve H\nGianna C\nLily P\nMarielle N\nReagan S\nSienna T\nTaylor G\nTeagan B\nTeagan M`;

        function App() {
            const [playerInput, setPlayerInput] = useState(DEFAULT_ROSTER);
            const [lineups, setLineups] = useState({});
            const [battingOrder, setBattingOrder] = useState({});
            const [activeInning, setActiveInning] = useState(1);
            const [activeMode, setActiveMode] = useState('fielding');
            const [view, setView] = useState('setup');

            useEffect(() => {
                const savedPlayers = localStorage.getItem('softball_players');
                const savedLineups = localStorage.getItem('softball_lineups');
                const savedBatting = localStorage.getItem('softball_batting');
                if (savedPlayers !== null) setPlayerInput(savedPlayers);
                if (savedLineups) { try { setLineups(JSON.parse(savedLineups)); } catch (e) {} }
                if (savedBatting) { try { setBattingOrder(JSON.parse(savedBatting)); } catch (e) {} }
            }, []);

            useEffect(() => { localStorage.setItem('softball_players', playerInput); }, [playerInput]);
            useEffect(() => { localStorage.setItem('softball_lineups', JSON.stringify(lineups)); }, [lineups]);
            useEffect(() => { localStorage.setItem('softball_batting', JSON.stringify(battingOrder)); }, [battingOrder]);

            const players = useMemo(() => playerInput.split('\n').map(p => p.trim()).filter(p => p !== ''), [playerInput]);
            const getAssignedFielders = (inning) => Object.values(lineups[inning] || {}).filter(p => p !== '');
            const getAssignedBatters = () => Object.values(battingOrder).filter(p => p !== '');
            const getBenchPlayers = (inning) => {
                const assigned = getAssignedFielders(inning);
                return players.filter(p => !assigned.includes(p));
            };

            const handlePositionChange = (inning, pos, name) => {
                setLineups(prev => ({ ...prev, [inning]: { ...(prev[inning] || {}), [pos]: name } }));
            };
            const handleBattingChange = (slot, name) => setBattingOrder(prev => ({ ...prev, [slot]: name }));
            const clearAllData = () => {
                if (window.confirm('Clear all data?')) {
                    setPlayerInput(''); setLineups({}); setBattingOrder({}); setView('setup'); localStorage.clear();
                }
            };

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-100 selection:bg-orange-500/30">
                    <LucideInit />
                    <header className="sticky top-0 z-50 bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 px-4 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-orange-600 p-1.5 rounded-lg"><i data-lucide="layout-grid" className="text-white w-5 h-5"></i></div>
                            <h1 className="text-lg font-bold tracking-tight uppercase italic">Lineup Pro</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView(view === 'setup' ? 'lineup' : 'setup')} className={`px-4 py-2 rounded-full text-xs font-bold uppercase transition-all ${view === 'setup' ? 'bg-zinc-800 text-zinc-400' : 'bg-orange-600 text-white'}`}>
                                {view === 'setup' ? 'View Lineup' : 'Edit Roster'}
                            </button>
                            <button onClick={clearAllData} className="p-2 bg-zinc-800 text-zinc-400 rounded-full hover:text-red-500"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 pb-24">
                        {view === 'setup' ? (
                            <section className="space-y-6">
                                <div className="space-y-2">
                                    <h2 className="text-sm font-semibold uppercase text-zinc-400">Roster Setup</h2>
                                    <textarea value={playerInput} onChange={(e) => setPlayerInput(e.target.value)} className="w-full h-64 bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-lg focus:ring-2 focus:ring-orange-600 outline-none" />
                                </div>
                                <button onClick={() => setView('lineup')} className="w-full py-4 bg-orange-600 text-white rounded-2xl font-bold text-lg">Start Lineup</button>
                            </section>
                        ) : (
                            <section className="space-y-6">
                                <div className="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
                                    {INNINGS.map(i => (
                                        <button key={i} onClick={() => setActiveInning(i)} className={`flex-shrink-0 w-14 h-14 rounded-2xl flex flex-col items-center justify-center border ${activeInning === i ? 'bg-orange-600 border-orange-500 text-white' : 'bg-zinc-900 border-zinc-800 text-zinc-500'}`}>
                                            <span className="text-[10px] font-bold">INN</span>
                                            <span className="text-xl font-black">{i}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
                                    <button onClick={() => setActiveMode('batting')} className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase ${activeMode === 'batting' ? 'bg-zinc-800 text-orange-500' : 'text-zinc-500'}`}>At Bat</button>
                                    <button onClick={() => setActiveMode('fielding')} className={`flex-1 py-3 rounded-xl font-bold text-xs uppercase ${activeMode === 'fielding' ? 'bg-zinc-800 text-orange-500' : 'text-zinc-500'}`}>Fielding</button>
                                </div>
                                <div className="grid gap-3">
                                    {(activeMode === 'batting' ? BATTING_SLOTS : POSITIONS).map(item => {
                                        const currentVal = activeMode === 'batting' ? battingOrder[item] : lineups[activeInning]?.[item];
                                        const assigned = activeMode === 'batting' ? getAssignedBatters() : getAssignedFielders(activeInning);
                                        const available = players.filter(p => !assigned.includes(p) || p === currentVal);
                                        return (
                                            <div key={item} className="flex items-center gap-3 bg-zinc-900 border border-zinc-800 rounded-2xl p-2 pl-4">
                                                <div className="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center text-orange-500 font-black text-xs">{item}</div>
                                                <select value={currentVal || ''} onChange={(e) => activeMode === 'batting' ? handleBattingChange(item, e.target.value) : handlePositionChange(activeInning, item, e.target.value)} className="flex-1 bg-transparent text-lg font-bold py-2 outline-none appearance-none">
                                                    <option value="">-- Select --</option>
                                                    {available.map(p => <option key={p} value={p} className="bg-zinc-900">{p}</option>)}
                                                </select>
                                            </div>
                                        );
                                    })}
                                </div>
                                {activeMode === 'fielding' && (
                                    <div className="bg-zinc-900/30 border border-dashed border-zinc-800 rounded-3xl p-6">
                                        <h2 className="text-sm font-bold uppercase text-zinc-500 mb-4 text-center">Bench</h2>
                                        <div className="flex flex-wrap gap-2 justify-center">
                                            {getBenchPlayers(activeInning).map((p, i) => <span key={i} className="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-zinc-400 text-sm">{p}</span>)}
                                        </div>
                                    </div>
                                )}
                            </section>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
