<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softball Lineup Pro - Standalone</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="text/babel">
        // Ensure we pull the functions from the Global window instead of "importing"
        const { useState, useEffect, useMemo } = React;
        // ... the rest of your app code starts here ...
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Tailwind-like classes for zinc theme */
        .bg-zinc-950 { background-color: #09090b; }
        .bg-zinc-900 { background-color: #18181b; }
        .bg-zinc-800 { background-color: #27272a; }
        .border-zinc-800 { border-color: #27272a; }
        .text-zinc-100 { color: #f4f4f5; }
        .text-zinc-400 { color: #a1a1aa; }
        .text-zinc-500 { color: #71717a; }
        .text-zinc-600 { color: #52525b; }
        .text-zinc-700 { color: #3f3f46; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Helper to initialize Lucide icons after each render
        const LucideInit = () => {
            useEffect(() => {
                lucide.createIcons();
            });
            return null;
        };

        const POSITIONS = ['P', 'C', '1B', '2B', '3B', 'SS', 'LF', 'LC', 'RC', 'RF'];
        const BATTING_SLOTS = Array.from({ length: 13 }, (_, i) => i + 1);
        const INNINGS = [1, 2, 3, 4, 5, 6];

        const DEFAULT_ROSTER = `Charlotte D
Anaya P (4th)
Emma P
Genevieve H
Gianna C (4th)
Lily P
Marielle N
Reagan S
Sienna T (4th)
Taylor G (4th)
Teagan B
Teagan M (4th)`;

        function App() {
            const [playerInput, setPlayerInput] = useState(DEFAULT_ROSTER);
            const [lineups, setLineups] = useState({});
            const [battingOrder, setBattingOrder] = useState({});
            const [activeInning, setActiveInning] = useState(1);
            const [activeMode, setActiveMode] = useState('fielding');
            const [view, setView] = useState('setup');

            // Load from localStorage
            useEffect(() => {
                const savedPlayers = localStorage.getItem('softball_players');
                const savedLineups = localStorage.getItem('softball_lineups');
                const savedBatting = localStorage.getItem('softball_batting');
                
                if (savedPlayers !== null) setPlayerInput(savedPlayers);
                if (savedLineups) {
                    try { setLineups(JSON.parse(savedLineups)); } catch (e) {}
                }
                if (savedBatting) {
                    try { setBattingOrder(JSON.parse(savedBatting)); } catch (e) {}
                }
            }, []);

            // Save to localStorage
            useEffect(() => { localStorage.setItem('softball_players', playerInput); }, [playerInput]);
            useEffect(() => { localStorage.setItem('softball_lineups', JSON.stringify(lineups)); }, [lineups]);
            useEffect(() => { localStorage.setItem('softball_batting', JSON.stringify(battingOrder)); }, [battingOrder]);

            const players = useMemo(() => {
                return playerInput.split('\n').map(p => p.trim()).filter(p => p !== '');
            }, [playerInput]);

            const getAssignedFielders = (inning) => {
                const inningLineup = lineups[inning] || {};
                return Object.values(inningLineup).filter(p => p !== '');
            };

            const getAssignedBatters = () => Object.values(battingOrder).filter(p => p !== '');

            const getBenchPlayers = (inning) => {
                const assigned = getAssignedFielders(inning);
                return players.filter(p => !assigned.includes(p));
            };

            const handlePositionChange = (inning, position, playerName) => {
                setLineups(prev => ({
                    ...prev,
                    [inning]: { ...(prev[inning] || {}), [position]: playerName }
                }));
            };

            const handleBattingChange = (slot, playerName) => {
                setBattingOrder(prev => ({ ...prev, [slot]: playerName }));
            };

            const clearAllData = () => {
                if (window.confirm('Are you sure you want to clear all data?')) {
                    setPlayerInput('');
                    setLineups({});
                    setBattingOrder({});
                    setActiveInning(1);
                    setView('setup');
                    localStorage.clear();
                }
            };

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-100 font-sans selection:bg-orange-500/30">
                    <LucideInit />
                    <header className="sticky top-0 z-50 bg-zinc-900/80 backdrop-blur-md border-b border-zinc-800 px-4 py-4 flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-orange-600 p-1.5 rounded-lg">
                                <i data-lucide="layout-grid" className="text-white w-5 h-5"></i>
                            </div>
                            <h1 className="text-lg font-bold tracking-tight uppercase italic">Lineup Pro</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView(view === 'setup' ? 'lineup' : 'setup')} className={`px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider transition-all ${view === 'setup' ? 'bg-zinc-800 text-zinc-400' : 'bg-orange-600 text-white shadow-lg'}`}>
                                {view === 'setup' ? 'View Lineup' : 'Edit Roster'}
                            </button>
                            <button onClick={clearAllData} className="p-2 bg-zinc-800 text-zinc-400 rounded-full hover:bg-red-900/30 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" className="w-[18px] h-[18px]"></i>
                            </button>
                        </div>
                    </header>

                    <main className="max-w-md mx-auto p-4 pb-24">
                        <AnimatePresence mode="wait">
                            {view === 'setup' ? (
                                <motion.section key="setup" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }} className="space-y-6">
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-2 text-zinc-400 mb-2">
                                            <i data-lucide="users" className="w-[18px] h-[18px]"></i>
                                            <h2 className="text-sm font-semibold uppercase tracking-widest">Roster Setup</h2>
                                        </div>
                                        <textarea value={playerInput} onChange={(e) => setPlayerInput(e.target.value)} placeholder="Enter names here..." className="w-full h-64 bg-zinc-900 border border-zinc-800 rounded-2xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-orange-600 transition-all placeholder:text-zinc-700" />
                                    </div>
                                    <div className="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-4">
                                        <h3 className="text-xs font-bold text-zinc-500 uppercase mb-3">Current Roster ({players.length})</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {players.length > 0 ? players.map((p, i) => <span key={i} className="px-3 py-1 bg-zinc-800 rounded-full text-sm font-medium border border-zinc-700">{p}</span>) : <p className="text-sm text-zinc-600 italic">No players added yet.</p>}
                                        </div>
                                    </div>
                                    <button onClick={() => setView('lineup')} disabled={players.length === 0} className="w-full py-4 bg-orange-600 disabled:bg-zinc-800 disabled:text-zinc-600 text-white rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                                        Start Lineup <i data-lucide="chevron-right" className="w-5 h-5"></i>
                                    </button>
                                </motion.section>
                            ) : (
                                <motion.section key="lineup" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }} className="space-y-6">
                                    <div className="flex overflow-x-auto gap-2 pb-2 no-scrollbar">
                                        {INNINGS.map((inning) => (
                                            <button key={inning} onClick={() => setActiveInning(inning)} className={`flex-shrink-0 w-14 h-14 rounded-2xl flex flex-col items-center justify-center transition-all border ${activeInning === inning ? 'bg-orange-600 border-orange-500 text-white shadow-lg' : 'bg-zinc-900 border-zinc-800 text-zinc-500'}`}>
                                                <span className="text-[10px] font-bold uppercase opacity-70">Inn</span>
                                                <span className="text-xl font-black leading-none">{inning}</span>
                                            </button>
                                        ))}
                                    </div>

                                    <div className="flex bg-zinc-900 p-1 rounded-2xl border border-zinc-800">
                                        <button onClick={() => setActiveMode('batting')} className={`flex-1 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm uppercase tracking-wider transition-all ${activeMode === 'batting' ? 'bg-zinc-800 text-orange-500 shadow-inner' : 'text-zinc-500'}`}>
                                            <i data-lucide="sword" className="w-4 h-4"></i> At Bat
                                        </button>
                                        <button onClick={() => setActiveMode('fielding')} className={`flex-1 py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm uppercase tracking-wider transition-all ${activeMode === 'fielding' ? 'bg-zinc-800 text-orange-500 shadow-inner' : 'text-zinc-500'}`}>
                                            <i data-lucide="shield" className="w-4 h-4"></i> In the Field
                                        </button>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="flex items-center gap-2 text-zinc-400 mb-2">
                                            <i data-lucide="clipboard-list" className="w-[18px] h-[18px]"></i>
                                            <h2 className="text-sm font-semibold uppercase tracking-widest">{activeMode === 'batting' ? 'Batting Order' : `Inning ${activeInning} Fielding`}</h2>
                                        </div>
                                        {activeMode === 'batting' ? (
                                            <div className="grid gap-3">
                                                {BATTING_SLOTS.map((slot) => {
                                                    const currentVal = battingOrder[slot] || '';
                                                    const assignedBatters = getAssignedBatters();
                                                    const available = players.filter(p => !assignedBatters.includes(p) || p === currentVal);
                                                    return (
                                                        <div key={slot} className="flex items-center gap-3 bg-zinc-900 border border-zinc-800 rounded-2xl p-2 pl-4 group active:bg-zinc-800 transition-colors">
                                                            <div className="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center text-orange-500 font-black text-sm border border-zinc-700">#{slot}</div>
                                                            <div className="flex-1 relative">
                                                                <select value={currentVal} onChange={(e) => handleBattingChange(slot, e.target.value)} className="w-full bg-transparent text-lg font-bold py-2 appearance-none focus:outline-none">
                                                                    <option value="" className="bg-zinc-900">-- Select Batter --</option>
                                                                    {available.map(p => <option key={p} value={p} className="bg-zinc-900">{p}</option>)}
                                                                </select>
                                                                <div className="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-600"><i data-lucide="chevron-right" className="w-4 h-4"></i></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="grid gap-3">
                                                {POSITIONS.map((pos) => {
                                                    const currentVal = lineups[activeInning]?.[pos] || '';
                                                    const assignedInInning = getAssignedFielders(activeInning);
                                                    const available = players.filter(p => !assignedInInning.includes(p) || p === currentVal);
                                                    return (
                                                        <div key={pos} className="flex items-center gap-3 bg-zinc-900 border border-zinc-800 rounded-2xl p-2 pl-4 group active:bg-zinc-800 transition-colors">
                                                            <div className="w-10 h-10 bg-zinc-800 rounded-xl flex items-center justify-center text-orange-500 font-black text-sm border border-zinc-700">{pos}</div>
                                                            <div className="flex-1 relative">
                                                                <select value={currentVal} onChange={(e) => handlePositionChange(activeInning, pos, e.target.value)} className="w-full bg-transparent text-lg font-bold py-2 appearance-none focus:outline-none">
                                                                    <option value="" className="bg-zinc-900">-- Select Player --</option>
                                                                    {available.map(p => <option key={p} value={p} className="bg-zinc-900">{p}</option>)}
                                                                </select>
                                                                <div className="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-zinc-600"><i data-lucide="chevron-right" className="w-4 h-4"></i></div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    {activeMode === 'fielding' && (
                                        <div className="bg-zinc-900/30 border border-dashed border-zinc-800 rounded-3xl p-6">
                                            <div className="flex items-center gap-2 text-zinc-500 mb-4">
                                                <i data-lucide="user-minus" className="w-[18px] h-[18px]"></i>
                                                <h2 className="text-sm font-bold uppercase tracking-widest">Bench / Out</h2>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {getBenchPlayers(activeInning).length > 0 ? getBenchPlayers(activeInning).map((p, i) => <span key={i} className="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-zinc-400 text-sm font-bold">{p}</span>) : <p className="text-sm text-zinc-700 italic">No players on bench.</p>}
                                            </div>
                                        </div>
                                    )}
                                </motion.section>
                            )}
                        </AnimatePresence>
                    </main>

                    {view === 'lineup' && (
                        <footer className="fixed bottom-0 left-0 right-0 bg-zinc-900/90 backdrop-blur-xl border-t border-zinc-800 p-4 flex justify-between items-center max-w-md mx-auto">
                            <button onClick={() => setActiveInning(prev => Math.max(1, prev - 1))} disabled={activeInning === 1} className="flex items-center gap-1 text-zinc-400 disabled:opacity-30 font-bold uppercase text-xs">
                                <i data-lucide="chevron-left" className="w-5 h-5"></i> Prev Inn
                            </button>
                            <div className="text-zinc-500 text-[10px] font-black uppercase tracking-[0.2em]">Inning {activeInning} of 6</div>
                            <button onClick={() => setActiveInning(prev => Math.min(6, prev + 1))} disabled={activeInning === 6} className="flex items-center gap-1 text-orange-500 disabled:opacity-30 font-bold uppercase text-xs">
                                Next Inn <i data-lucide="chevron-right" className="w-5 h-5"></i>
                            </button>
                        </footer>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
