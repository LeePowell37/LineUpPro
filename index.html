<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lineup Pro - Ironclad Fairness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background-color: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        select { background-color: #09090b; color: white; border: 1px solid #3f3f46; border-radius: 8px; padding: 10px; flex-grow: 1; font-size: 16px; outline: none; -webkit-appearance: none; }
        select:focus { border-color: #ea580c; }
        .pos-label { width: 45px; font-weight: 800; color: #ea580c; text-align: center; font-size: 13px; font-style: italic; }
        .tab-active { background-color: #ea580c !important; color: white !important; border-color: #f97316 !important; }
        .hidden { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .badge-pos { background-color: #27272a; color: #a1a1aa; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-right: 4px; }
        .star-active { color: #facc15; }
        .bench-warn { color: #ef4444; font-size: 9px; font-weight: bold; margin-left: 4px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-32">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black text-orange-600 italic tracking-tighter">LINEUP PRO</h1>
        <button onclick="clearData()" class="text-[10px] font-bold text-zinc-600 uppercase border border-zinc-800 px-2 py-1 rounded">Reset Game</button>
    </div>

    <div id="setup-view">
        <textarea id="roster-input" class="w-full h-80 bg-zinc-900 border border-zinc-800 rounded-2xl p-4 mb-4 outline-none focus:border-orange-600 text-sm"></textarea>
        <button onclick="startApp()" class="w-full py-4 bg-orange-600 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95">Start Planning</button>
    </div>

    <div id="main-view" class="hidden">
        <div class="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800 mb-6">
            <button id="btn-fielding" onclick="setMode('fielding')" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase tab-active">Fielding</button>
            <button id="btn-batting" onclick="setMode('batting')" class="flex-1 py-2 rounded-lg font-bold text-xs uppercase text-zinc-500">Batting</button>
        </div>

        <div id="fielding-container">
            <div class="flex justify-between items-center mb-4">
                <div id="inning-tabs" class="flex gap-2 overflow-x-auto no-scrollbar">
                    <button onclick="setInning(1)" class="inn-btn w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 font-bold tab-active">1</button>
                    <button onclick="setInning(2)" class="inn-btn w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 font-bold text-zinc-500">2</button>
                    <button onclick="setInning(3)" class="inn-btn w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 font-bold text-zinc-500">3</button>
                    <button onclick="setInning(4)" class="inn-btn w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 font-bold text-zinc-500">4</button>
                    <button onclick="setInning(5)" class="inn-btn w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 font-bold text-zinc-500">5</button>
                    <button onclick="setInning(6)" class="inn-btn w-10 h-10 rounded-lg border border-zinc-800 bg-zinc-900 font-bold text-zinc-500">6</button>
                </div>
                <button onclick="autoFillInning()" class="bg-zinc-800 text-[9px] font-bold px-3 py-2 rounded-lg border border-zinc-700 text-orange-400">AUTO-FILL</button>
            </div>
            <div id="fielding-list"></div>
        </div>

        <div id="batting-container" class="hidden">
            <div id="batting-list"></div>
        </div>
        
        <div class="mt-12 pt-6 border-t border-zinc-800">
            <h3 class="text-[10px] font-black text-orange-500 uppercase mb-4 italic tracking-widest text-center">Defensive History & Variety Tracker</h3>
            <div id="tracker-list" class="space-y-2"></div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-zinc-950/90 backdrop-blur-md border-t border-zinc-800 flex justify-center max-w-md mx-auto">
            <button onclick="showSetup()" class="px-8 py-3 bg-zinc-800 rounded-full text-zinc-400 font-bold text-xs uppercase border border-zinc-700">Back to Roster</button>
        </div>
    </div>

    <script>
        let players = [];
        let starredPlayers = [];
        let currentInning = 1;
        let activeMode = 'fielding';
        let fieldingData = {}; 
        let battingData = {};
        const POSITIONS = ['P', 'C', '1B', '2B', '3B', 'SS', 'LF', 'LC', 'RC', 'RF'];
        const INFIELD = ['P', 'C', '1B', '2B', '3B', 'SS'];
        const DEFAULT_ROSTER = `Charlotte D\nAnaya P (4th)\nEmma P\nGenevieve H\nGianna C (4th)\nLily P (No PC)\nMarielle N\nReagan S\nSienna T (4th)\nTaylor G (4th)\nTeagan B\nTeagan M (4th)`;

        // Reset Storage Key to ensure fresh start
        const STORAGE_KEY = 'softball_v14_ironclad';

        function load() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('roster-input').value = data.roster || DEFAULT_ROSTER;
                fieldingData = data.fielding || {};
                battingData = data.batting || {};
                starredPlayers = data.stars || [];
            } else {
                document.getElementById('roster-input').value = DEFAULT_ROSTER;
            }
        }

        function save() {
            const roster = document.getElementById('roster-input').value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ 
                roster, fielding: fieldingData, batting: battingData, stars: starredPlayers 
            }));
        }

        function startApp() {
            const raw = document.getElementById('roster-input').value;
            players = raw.split('\n').map(n => n.trim()).filter(n => n !== "");
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            render();
            save();
        }

        function showSetup() { document.getElementById('setup-view').classList.remove('hidden'); document.getElementById('main-view').classList.add('hidden'); }
        function setInning(n) { currentInning = n; render(); }
        function setMode(m) { activeMode = m; render(); }
        function toggleStar(p) { if(starredPlayers.includes(p)) starredPlayers = starredPlayers.filter(x => x !== p); else starredPlayers.push(p); save(); render(); }

        function autoFillInning() {
            if (!fieldingData[currentInning]) fieldingData[currentInning] = {};
            
            POSITIONS.forEach(pos => {
                if (!fieldingData[currentInning][pos]) {
                    const takenNow = Object.values(fieldingData[currentInning]);
                    
                    // Logic: Find players not on field, who haven't played this pos >= 2 times
                    let candidates = players.filter(p => {
                        const onField = takenNow.includes(p);
                        const noPC = p.toLowerCase().includes("(no pc)") && (pos === 'P' || pos === 'C');
                        
                        // History check
                        let posCount = 0;
                        for(let i=1; i<=6; i++) { if(fieldingData[i] && fieldingData[i][pos] === p) posCount++; }
                        
                        return !onField && !noPC && posCount < 2;
                    });

                    if (candidates.length > 0) {
                        // Prioritize based on total sits
                        candidates.sort((a, b) => {
                            let sitsA = 0; let sitsB = 0;
                            for(let i=1; i<=6; i++) {
                                if(fieldingData[i] && !Object.values(fieldingData[i]).includes(a)) sitsA++;
                                if(fieldingData[i] && !Object.values(fieldingData[i]).includes(b)) sitsB++;
                            }
                            if (sitsB !== sitsA) return sitsB - sitsA;
                            if (INFIELD.includes(pos)) return (starredPlayers.includes(b) ? 1 : -1);
                            return 0;
                        });
                        fieldingData[currentInning][pos] = candidates[0];
                    }
                }
            });
            save(); render();
        }

        function render() {
            document.getElementById('btn-fielding').classList.toggle('tab-active', activeMode === 'fielding');
            document.getElementById('btn-batting').classList.toggle('tab-active', activeMode === 'batting');
            document.getElementById('fielding-container').classList.toggle('hidden', activeMode === 'batting');
            document.getElementById('batting-container').classList.toggle('hidden', activeMode === 'fielding');
            document.querySelectorAll('.inn-btn').forEach((btn, i) => btn.classList.toggle('tab-active', (i+1) === currentInning));

            const flist = document.getElementById('fielding-list');
            const blist = document.getElementById('batting-list');
            flist.innerHTML = ""; blist.innerHTML = "";

            if (activeMode === 'fielding') {
                const currentSet = fieldingData[currentInning] || {};
                const takenFielders = Object.values(currentSet).filter(n => n !== "");
                POSITIONS.forEach(pos => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    let opts = `<option value="">-- Bench --</option>`;
                    players.forEach(p => {
                        const noPC = p.toLowerCase().includes("(no pc)") && (pos === 'P' || pos === 'C');
                        const isTaken = takenFielders.includes(p) && currentSet[pos] !== p;
                        if (!noPC && !isTaken) {
                            opts += `<option value="${p}" ${currentSet[pos] === p ? 'selected' : ''}>${p}</option>`;
                        }
                    });
                    div.innerHTML = `<div class="pos-label">${pos}</div><select onchange="updateField('${pos}', this.value)">${opts}</select>`;
                    flist.appendChild(div);
                });
            } else {
                const takenBatters = Object.values(battingData).filter(n => n !== "");
                players.forEach((_, i) => {
                    const slot = i + 1;
                    const div = document.createElement('div');
                    div.className = 'card';
                    let opts = `<option value="">-- Select --</option>`;
                    players.forEach(p => {
                        const isTaken = takenBatters.includes(p) && battingData[slot] !== p;
                        if (!isTaken) {
                            opts += `<option value="${p}" ${battingData[slot] === p ? 'selected' : ''}>${p}</option>`;
                        }
                    });
                    div.innerHTML = `<div class="pos-label">#${slot}</div><select onchange="updateBat('${slot}', this.value)">${opts}</select>`;
                    blist.appendChild(div);
                });
            }
            updateTracker();
        }

        function updateField(pos, val) {
            if (!fieldingData[currentInning]) fieldingData[currentInning] = {};
            fieldingData[currentInning][pos] = val;
            if (currentInning === 1 && (pos === 'P' || pos === 'C') && val !== "") {
                if (confirm(`Lock ${val} as ${pos} for 3 innings?`)) {
                    for (let i = 2; i <= 3; i++) { if (!fieldingData[i]) fieldingData[i] = {}; fieldingData[i][pos] = val; }
                }
            }
            save(); render();
        }

        function updateBat(s, v) { battingData[s] = v; save(); render(); }

        function updateTracker() {
            const list = document.getElementById('tracker-list');
            list.innerHTML = "";
            players.forEach(player => {
                let played = [];
                let sitTotal = 0;
                let sittingNow = 0;
                
                for (let i = 1; i <= 6; i++) {
                    const inn = fieldingData[i] || {};
                    let found = false;
                    for (const pos in inn) { if (inn[pos] === player) { played.push(pos); found = true; } }
                    if (!found) { sitTotal++; sittingNow++; } else { sittingNow = 0; }
                }

                const isStarred = starredPlayers.includes(player);
                const row = document.createElement('div');
                row.className = "flex justify-between items-center bg-zinc-900/40 p-2 rounded-lg mb-1 border border-zinc-800/50";
                row.innerHTML = `
                    <div class="flex items-center gap-2">
                        <button onclick="toggleStar('${player}')" class="text-sm ${isStarred ? 'star-active' : 'text-zinc-700'}">★</button>
                        <div class="text-[11px] font-bold ${isStarred ? 'text-yellow-500' : 'text-zinc-400'}">
                            ${player} 
                            <span class="text-[9px] opacity-40 font-normal">(${sitTotal} sits)</span>
                            ${sittingNow >= 2 ? '<span class="bench-warn">!! CONSECUTIVE</span>' : ''}
                        </div>
                    </div>
                    <div class="flex flex-wrap gap-1 justify-end">${played.map(p => `<span class="badge-pos">${p}</span>`).join('')}</div>`;
                list.appendChild(row);
            });
        }

        function clearData() { if (confirm("Wipe all?")) { localStorage.clear(); location.reload(); } }

        load(); // Initial load run
    </script>
</body>
</html>
